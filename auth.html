<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Авторизация - Московская робототехника</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #DC143C 0%, #8B0000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .avatar {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            color: #1A1A1A;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 20px;
        }
        .loader {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #DC143C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">🤖</div>
        <h1>Московская робототехника</h1>
        <p>Авторизация через Telegram...</p>
        <div class="loader"></div>
    </div>

    <script>
        // Получаем параметры из URL (данные от Telegram)
        const urlParams = new URLSearchParams(window.location.search);
        
        // Проверяем, есть ли данные пользователя
        if (urlParams.has('id') && urlParams.has('auth_date')) {
            // Сохраняем данные пользователя
            const userData = {
                id: urlParams.get('id'),
                first_name: urlParams.get('first_name'),
                last_name: urlParams.get('last_name'),
                username: urlParams.get('username'),
                photo_url: urlParams.get('photo_url'),
                auth_date: urlParams.get('auth_date'),
                hash: urlParams.get('hash')
            };
            
            // Сохраняем в localStorage
            localStorage.setItem('telegram_user', JSON.stringify(userData));
            localStorage.setItem('telegram_auth_date', userData.auth_date);
            
            // Перенаправляем на главную страницу
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        } else {
            // Нет данных — возвращаемся на главную
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        }
    </script>
</body>
</html>
