<script>
    // Конфигурация Supabase
    const SUPABASE_URL = 'https://vuqaoimnggjcbjdqkrqc.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1cWFvaW1uZ2dqY2JqZHFrcnFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MzA0NDAsImV4cCI6MjA5NTIwNjQ0MH0.nt3BjibiB4ze92obD2VTd2cCxeo0Gtqar_uR-PjVciw';
    
    // Создаём клиент Supabase
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let telegramUser = null;
    let currentUser = null;

    // Функция для установки аватарки
    function setAvatar(photoUrl, elementId) {
        const avatarElement = document.getElementById(elementId);
        if (photoUrl) {
            avatarElement.innerHTML = `<img src="${photoUrl}" alt="Аватар">`;
        } else {
            avatarElement.innerHTML = '🤖';
        }
    }
    
    // Функция применения темы к странице
    function applyTheme(theme) {
        const body = document.body;
        const themeBtnReg = document.getElementById('themeBtnReg');
        const themeBtnApp = document.getElementById('themeBtnApp');
        
        if (theme === 'dark') {
            body.classList.add('dark');
            if (themeBtnReg) themeBtnReg.textContent = '☀️';
            if (themeBtnApp) themeBtnApp.textContent = '☀️';
        } else {
            body.classList.remove('dark');
            if (themeBtnReg) themeBtnReg.textContent = '🌙';
            if (themeBtnApp) themeBtnApp.textContent = '🌙';
        }
    }
    
    // Функция сохранения темы в базу данных
    async function saveThemeToDatabase(theme) {
        if (!currentUser || !currentUser.id) {
            console.log('Пользователь не авторизован, сохраняем в localStorage');
            localStorage.setItem('theme', theme);
            return;
        }
        
        console.log('Сохраняем тему в БД:', theme, 'для пользователя:', currentUser.id);
        
        const { data, error } = await supabase
            .from('users')
            .update({ theme: theme })
            .eq('id', currentUser.id)
            .select();
        
        if (error) {
            console.error('Ошибка сохранения темы:', error);
        } else {
            console.log('Тема успешно сохранена:', data);
            // Обновляем локальную переменную
            currentUser.theme = theme;
        }
    }
    
    // Функция переключения темы
    async function toggleTheme() {
        const isDark = document.body.classList.contains('dark');
        const newTheme = isDark ? 'light' : 'dark';
        
        console.log('Переключаем тему с', isDark ? 'dark' : 'light', 'на', newTheme);
        
        // Применяем тему визуально
        applyTheme(newTheme);
        
        // Сохраняем в базу данных
        await saveThemeToDatabase(newTheme);
    }
    
    // Функция загрузки сохранённой темы
    async function loadSavedTheme() {
        let theme = null;
        
        // Если пользователь авторизован, берём тему из базы
        if (currentUser && currentUser.id) {
            // Проверяем, есть ли тема в currentUser
            if (currentUser.theme) {
                theme = currentUser.theme;
                console.log('Тема из currentUser:', theme);
            } else {
                // Если темы нет, запрашиваем из базы
                const { data, error } = await supabase
                    .from('users')
                    .select('theme')
                    .eq('id', currentUser.id)
                    .single();
                
                if (!error && data && data.theme) {
                    theme = data.theme;
                    currentUser.theme = theme;
                    console.log('Тема из БД (запрос):', theme);
                }
            }
        }
        
        // Если темы нет нигде, берём из localStorage или ставим 'light'
        if (!theme) {
            theme = localStorage.getItem('theme');
            console.log('Тема из localStorage:', theme);
        }
        
        if (!theme) {
            theme = 'light';
            console.log('Тема по умолчанию: light');
        }
        
        // Применяем тему
        applyTheme(theme);
    }

    window.onload = async function() {
        // Получаем данные из Telegram
        if (window.Telegram && window.Telegram.WebApp) {
            telegramUser = window.Telegram.WebApp.initDataUnsafe?.user;
            if (telegramUser) {
                document.getElementById('regTelegramId').innerHTML = `<strong>Telegram:</strong> ${telegramUser.first_name || ''} ${telegramUser.last_name || ''}`;
                
                if (telegramUser.photo_url) {
                    setAvatar(telegramUser.photo_url, 'userAvatar');
                    setAvatar(telegramUser.photo_url, 'regAvatar');
                }
            }
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        } else {
            console.log("Работаем вне Telegram (для теста)");
            telegramUser = { id: 123456789, first_name: "Тестовый" };
        }
        
        await checkUserAndLoad();
    };

    async function checkUserAndLoad() {
        if (!telegramUser) {
            document.getElementById('loadingSpinner').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').innerText = 'Гость';
            loadDemoData();
            loadSavedTheme();
            return;
        }

        const { data, error } = await supabase
            .from('users')
            .select('*')
            .eq('telegram_id', telegramUser.id)
            .maybeSingle();

        if (error) {
            console.error('Ошибка:', error);
            showError('Ошибка подключения к базе данных');
            return;
        }

        if (data) {
            currentUser = data;
            document.getElementById('loadingSpinner').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            const fullName = `${data.last_name} ${data.first_name} ${data.patronymic || ''}`.trim();
            document.getElementById('userName').innerText = fullName;
            document.getElementById('userPublicId').innerHTML = `${data.public_id || `USR-${data.id}`}`;
            await loadSavedTheme();
            loadData();
        } else {
            document.getElementById('loadingSpinner').classList.add('hidden');
            document.getElementById('registrationForm').classList.remove('hidden');
            loadSavedTheme();
        }
    }

    async function registerUser() {
        const lastName = document.getElementById('lastName').value.trim();
        const firstName = document.getElementById('firstName').value.trim();
        const patronymic = document.getElementById('patronymic').value.trim();
        const birthDate = document.getElementById('birthDate').value;

        if (!lastName || !firstName || !birthDate) {
            alert('Пожалуйста, заполните фамилию, имя и дату рождения');
            return;
        }

        const { data, error } = await supabase
            .from('users')
            .insert([{
                telegram_id: telegramUser.id,
                last_name: lastName,
                first_name: firstName,
                patronymic: patronymic || null,
                birth_date: birthDate,
                theme: 'light'
            }])
            .select()
            .single();

        if (error) {
            console.error('Ошибка регистрации:', error);
            alert('Ошибка при регистрации: ' + error.message);
            return;
        }

        currentUser = data;
        document.getElementById('registrationForm').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        const fullName = `${data.last_name} ${data.first_name} ${data.patronymic || ''}`.trim();
        document.getElementById('userName').innerText = fullName;
        document.getElementById('userPublicId').innerHTML = `${data.public_id || `USR-${data.id}`}`;
        await loadSavedTheme();
        loadData();
    }

    async function loadData() {
        if (!currentUser) {
            loadDemoData();
            return;
        }

        document.getElementById('resultsList').innerHTML = '<div class="info-note">📥 Загрузка результатов...</div>';
        document.getElementById('topList').innerHTML = '<div class="info-note">📥 Загрузка рейтинга...</div>';

        try {
            // Загружаем результаты пользователя
            const { data: results, error: resultsError } = await supabase
                .from('results')
                .select(`
                    id,
                    place,
                    points,
                    awarded_at,
                    olympiads (id, name, year, public_id)
                `)
                .eq('user_id', currentUser.id)
                .order('awarded_at', { ascending: false });

            if (!resultsError && results) {
                const participationsCount = results.length;
                document.getElementById('participationsCount').innerHTML = `📊 Event: ${participationsCount}`;
                
                if (results.length === 0) {
                    document.getElementById('resultsList').innerHTML = '<div class="info-note">📭 Пока нет результатов. Участвуйте в олимпиадах!</div>';
                    document.getElementById('ratingValue').innerText = '0';
                } else {
                    let totalPoints = 0;
                    const resultsHtml = results.map(r => {
                        totalPoints += r.points;
                        let placeText = '';
                        if (r.place === '1') placeText = '🥇 1 место';
                        else if (r.place === '2') placeText = '🥈 2 место';
                        else if (r.place === '3') placeText = '🥉 3 место';
                        else placeText = '📋 Участие';
                        
                        const olympiad = r.olympiads;
                        const olympiadName = olympiad ? `${olympiad.name} (${olympiad.year})` : 'Олимпиада';
                        const olympiadPublicId = olympiad?.public_id ? ` ${olympiad.public_id}` : '';
                        
                        return `
                            <div class="result-item">
                                <div>
                                    <div class="olympiad-name">${olympiadName}<span class="olympiad-badge">${olympiadPublicId}</span></div>
                                    <div style="font-size: 12px;">${r.points} б</div>
                                </div>
                                <div class="olympiad-place">${placeText}</div>
                            </div>
                        `;
                    }).join('');
                    
                    document.getElementById('resultsList').innerHTML = resultsHtml;
                    document.getElementById('ratingValue').innerText = totalPoints;
                }
            }

            // Загружаем общий рейтинг
            const { data: allUsers, error: usersError } = await supabase
                .from('users')
                .select('id, last_name, first_name, patronymic, public_id');

            const { data: allResults, error: resultsAllError } = await supabase
                .from('results')
                .select('user_id, points');

            if (!usersError && !resultsAllError && allUsers) {
                const userScores = {};
                allResults.forEach(r => {
                    userScores[r.user_id] = (userScores[r.user_id] || 0) + r.points;
                });
                
                const ranking = allUsers.map(u => {
                    const fullName = `${u.last_name} ${u.first_name} ${u.patronymic || ''}`.trim();
                    const displayName = u.public_id ? `${fullName} (${u.public_id})` : fullName;
                    return {
                        name: displayName,
                        score: userScores[u.id] || 0,
                        id: u.id
                    };
                }).sort((a, b) => b.score - a.score);
                
                const topList = ranking.slice(0, 10);
                const topHtml = topList.map((u, idx) => {
                    const rankText = `${idx + 1}.`;
                    return `
                        <div class="result-item" style="${u.id === currentUser?.id ? 'background: rgba(220,20,60,0.1);' : ''}">
                            <div><span class="rank-number">${rankText}</span> <span style="color: var(--text-primary);">${u.name}</span></div>
                            <div style="font-weight: bold; color: #DC143C;">${u.score} б</div>
                        </div>
                    `;
                }).join('');
                
                document.getElementById('topList').innerHTML = topHtml || '<div class="info-note">Нет данных</div>';
                
                const userRank = ranking.findIndex(u => u.id === currentUser?.id) + 1;
                if (userRank > 0) {
                    document.getElementById('globalRank').innerHTML = `Место: ${userRank} из ${ranking.length}`;
                }
            }
        } catch (err) {
            console.error('Ошибка:', err);
            showError('Не удалось загрузить данные');
        }
    }

    function loadDemoData() {
        document.getElementById('ratingValue').innerText = '2450';
        document.getElementById('globalRank').innerHTML = 'Место: 3 из 42';
        document.getElementById('participationsCount').innerHTML = '📊 Event: 3';
        document.getElementById('resultsList').innerHTML = `
            <div class="result-item"><div><div class="olympiad-name">Олимпиада по робототехнике (2025)</div><div style="font-size:12px;">100 б</div></div><div class="olympiad-place">🥇 1 место</div></div>
            <div class="result-item"><div><div class="olympiad-name">Робофест-2025</div><div style="font-size:12px;">75 б</div></div><div class="olympiad-place">🥈 2 место</div></div>
            <div class="result-item"><div><div class="olympiad-name">Открытый кубок</div><div style="font-size:12px;">25 б</div></div><div class="olympiad-place">📋 Участие</div></div>
        `;
        document.getElementById('topList').innerHTML = `
            <div class="result-item"><div><span class="rank-number">1.</span> <span style="color: var(--text-primary);">Алексей С. 🥇</span></div><div style="font-weight: bold; color: #DC143C;">3150 б</div></div>
            <div class="result-item"><div><span class="rank-number">2.</span> <span style="color: var(--text-primary);">Мария К. 🥈</span></div><div style="font-weight: bold; color: #DC143C;">2890 б</div></div>
            <div class="result-item" style="background: rgba(220,20,60,0.1);"><div><span class="rank-number">3.</span> <span style="color: var(--text-primary);">Вы 🥉</span></div><div style="font-weight: bold; color: #DC143C;">2450 б</div></div>
            <div class="result-item"><div><span class="rank-number">4.</span> <span style="color: var(--text-primary);">Дмитрий В.</span></div><div style="font-weight: bold; color: #DC143C;">2100 б</div></div>
        `;
    }

    function showError(msg) {
        document.getElementById('resultsList').innerHTML = `<div class="info-note error">❌ ${msg}</div>`;
        document.getElementById('topList').innerHTML = `<div class="info-note error">❌ ${msg}</div>`;
    }
</script>
