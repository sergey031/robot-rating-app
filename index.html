<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Московская робототехника | Рейтинг</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Светлая тема (по умолчанию) */
        :root {
            --bg-gradient-start: #DC143C;
            --bg-gradient-end: #8B0000;
            --card-bg: white;
            --text-primary: #1A1A1A;
            --text-secondary: #666;
            --border-color: #ddd;
            --result-bg: #f8f9fa;
            --rating-bg-start: #1A2A6A;
            --rating-bg-end: #0F1A3A;
            --button-bg: #DC143C;
            --button-hover: #B01030;
            --shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        /* Тёмная тема */
        body.dark {
            --bg-gradient-start: #1A1A2E;
            --bg-gradient-end: #0F0F1A;
            --card-bg: #2D2D3A;
            --text-primary: #EEEEEE;
            --text-secondary: #AAAAAA;
            --border-color: #444;
            --result-bg: #3A3A4A;
            --rating-bg-start: #1A1A2E;
            --rating-bg-end: #0F0F1A;
            --button-bg: #DC143C;
            --button-hover: #E0163E;
            --shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
        }
        
        .container { max-width: 500px; margin: 0 auto; position: relative; }
        
        /* Переключатель темы */
        .theme-switch {
            position: absolute;
            top: 0;
            right: 0;
            z-index: 100;
        }
        
        .theme-btn {
            background: var(--card-bg);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 22px;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .theme-btn:hover {
            transform: scale(1.05);
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            transition: background 0.3s ease;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }
        
        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #DC143C 0%, #8B0000 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 40px;
            overflow: hidden;
        }
        
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        h1 {
            font-size: 24px;
            color: var(--text-primary);
            margin-bottom: 5px;
        }
        
        .user-id {
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: 5px;
            font-family: monospace;
            background: var(--result-bg);
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
        }
        
        .telegram-id {
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: 5px;
        }
        
        .rating-box {
            background: linear-gradient(135deg, var(--rating-bg-start) 0%, var(--rating-bg-end) 100%);
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .rating-value {
            font-size: 48px;
            font-weight: bold;
        }
        
        .rating-label {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--text-primary);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #DC143C;
        }
        
        .result-item {
            padding: 12px;
            background: var(--result-bg);
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .olympiad-name { font-weight: 500; color: var(--text-primary); }
        .olympiad-place { font-weight: bold; color: #DC143C; }
        
        .form-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 16px;
            background: var(--card-bg);
            color: var(--text-primary);
        }
        
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .form-row .form-input {
            margin-bottom: 0;
            flex: 1;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #DC143C 0%, #B01030 100%);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(220, 20, 60, 0.3);
            width: 100%;
        }
        
        .refresh-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(220, 20, 60, 0.4);
            background: linear-gradient(135deg, #E0163E 0%, #C01030 100%);
        }
        
        .refresh-btn:active {
            transform: scale(0.98);
        }
        
        .info-note {
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            text-align: center;
        }
        
        .loading { text-align: center; padding: 40px; color: white; font-size: 18px; }
        .hidden { display: none; }
        .success { color: green; }
        .error { color: red; }
        
        .footer {
            text-align: center;
            padding: 15px;
            color: rgba(255,255,255,0.8);
            font-size: 12px;
        }
        
        .footer a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        .channel-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 30px;
            margin-top: 10px;
            transition: background 0.3s;
        }
        
        .channel-link:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .olympiad-badge {
            font-size: 10px;
            color: var(--text-secondary);
            font-family: monospace;
            margin-left: 8px;
        }
        
        body.dark .info-note {
            background: #3A3A4A;
            color: #FFD700;
        }
        
        body.dark .user-id {
            background: #3A3A4A;
        }
        
        body.dark .form-input::placeholder {
            color: #888;
        }
    </style>
</head>
<body>
    <!-- Подключение Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <div id="loadingSpinner" class="loading">🤖 Загрузка приложения...</div>
    
    <!-- Форма регистрации -->
    <div id="registrationForm" class="container hidden">
        <div class="theme-switch">
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
        </div>
        <div class="card">
            <div class="header">
                <div class="avatar" id="regAvatar">🤖</div>
                <h1>Добро пожаловать!</h1>
                <div class="telegram-id" id="regTelegramId"></div>
            </div>
            <p style="margin-bottom: 15px; color: var(--text-secondary);">Заполните данные для участия в рейтинге:</p>
            
            <div class="form-row">
                <input type="text" id="lastName" class="form-input" placeholder="Фамилия">
                <input type="text" id="firstName" class="form-input" placeholder="Имя">
            </div>
            <input type="text" id="patronymic" class="form-input" placeholder="Отчество (необязательно)">
            <input type="date" id="birthDate" class="form-input" placeholder="Дата рождения">
            <button class="refresh-btn" onclick="registerUser()">📝 Зарегистрироваться</button>
        </div>
        <div class="footer">
            <a href="https://t.me/mosrobotics" target="_blank" class="channel-link">
                📢 Официальный канал Mosrobotics
            </a>
        </div>
    </div>

    <!-- Главное приложение -->
    <div id="mainApp" class="container hidden">
        <div class="theme-switch">
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
        </div>
        <div class="card">
            <div class="header">
                <div class="avatar" id="userAvatar">🤖</div>
                <h1 id="userName">Загрузка...</h1>
                <div class="user-id" id="userPublicId"></div>
                <div class="telegram-id" id="telegramId"></div>
            </div>
            <div class="rating-box">
                <div class="rating-value" id="ratingValue">0</div>
                <div class="rating-label">Текущий рейтинг</div>
                <div style="margin-top: 10px; font-size: 14px;" id="globalRank">Место: --</div>
            </div>
        </div>
        
        <div class="card">
            <div class="section-title">🏆 Мои результаты</div>
            <div id="resultsList"></div>
        </div>
        
        <div class="card">
            <div class="section-title">📊 Общий рейтинг</div>
            <div id="topList"></div>
        </div>
        
        <div class="card">
            <button class="refresh-btn" onclick="loadData()">
                🔄 Обновить данные
            </button>
        </div>
        
        <div class="footer">
            <a href="https://t.me/mosrobotics" target="_blank" class="channel-link">
                📢 Официальный канал Mosrobotics
            </a>
        </div>
    </div>

    <script>
        // Конфигурация Supabase
        const SUPABASE_URL = 'https://vuqaoimnggjcbjdqkrqc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1cWFvaW1uZ2dqY2JqZHFrcnFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MzA0NDAsImV4cCI6MjA5NTIwNjQ0MH0.nt3BjibiB4ze92obD2VTd2cCxeo0Gtqar_uR-PjVciw';
        
        // Создаём клиент Supabase
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let telegramUser = null;
        let currentUser = null;

        // Функция для установки аватарки
        function setAvatar(photoUrl, elementId) {
            const avatarElement = document.getElementById(elementId);
            if (photoUrl) {
                avatarElement.innerHTML = `<img src="${photoUrl}" alt="Аватар">`;
            } else {
                avatarElement.innerHTML = '🤖';
            }
        }
        
        // Функция переключения темы
        async function toggleTheme() {
            const body = document.body;
            const isDark = body.classList.contains('dark');
            const newTheme = isDark ? 'light' : 'dark';
            const themeBtn = document.getElementById('themeBtn');
            
            if (isDark) {
                body.classList.remove('dark');
                themeBtn.textContent = '🌙';
            } else {
                body.classList.add('dark');
                themeBtn.textContent = '☀️';
            }
            
            // Сохраняем тему в базе данных, если пользователь авторизован
            if (currentUser && currentUser.id) {
                await supabase
                    .from('users')
                    .update({ theme: newTheme })
                    .eq('id', currentUser.id);
            }
            
            // Сохраняем в localStorage для гостей
            localStorage.setItem('theme', newTheme);
        }
        
        // Функция загрузки сохранённой темы
        async function loadSavedTheme() {
            // Если пользователь авторизован, берём тему из базы
            if (currentUser && currentUser.theme) {
                if (currentUser.theme === 'dark') {
                    document.body.classList.add('dark');
                    document.getElementById('themeBtn').textContent = '☀️';
                } else {
                    document.body.classList.remove('dark');
                    document.getElementById('themeBtn').textContent = '🌙';
                }
            } else {
                // Иначе из localStorage
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark') {
                    document.body.classList.add('dark');
                    document.getElementById('themeBtn').textContent = '☀️';
                }
            }
        }

        window.onload = async function() {
            // Получаем данные из Telegram
            if (window.Telegram && window.Telegram.WebApp) {
                telegramUser = window.Telegram.WebApp.initDataUnsafe?.user;
                if (telegramUser) {
                    document.getElementById('telegramId').innerText = `Telegram ID: ${telegramUser.id}`;
                    document.getElementById('regTelegramId').innerHTML = `<strong>Telegram ID:</strong> ${telegramUser.id}<br><span style="font-size:12px;">${telegramUser.first_name || ''} ${telegramUser.last_name || ''}</span>`;
                    
                    if (telegramUser.photo_url) {
                        setAvatar(telegramUser.photo_url, 'userAvatar');
                        setAvatar(telegramUser.photo_url, 'regAvatar');
                    }
                }
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            } else {
                console.log("Работаем вне Telegram (для теста)");
                telegramUser = { id: 123456789, first_name: "Тестовый" };
                document.getElementById('telegramId').innerText = 'Telegram ID: 123456789 (тест)';
            }
            
            await checkUserAndLoad();
        };

        async function checkUserAndLoad() {
            if (!telegramUser) {
                document.getElementById('loadingSpinner').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('userName').innerText = 'Гость';
                loadDemoData();
                loadSavedTheme();
                return;
            }

            const { data, error } = await supabase
                .from('users')
                .select('*')
                .eq('telegram_id', telegramUser.id)
                .maybeSingle();

            if (error) {
                console.error('Ошибка:', error);
                showError('Ошибка подключения к базе данных');
                return;
            }

            if (data) {
                currentUser = data;
                document.getElementById('loadingSpinner').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                const fullName = `${data.last_name} ${data.first_name} ${data.patronymic || ''}`.trim();
                document.getElementById('userName').innerText = fullName;
                document.getElementById('userPublicId').innerHTML = `ID: ${data.public_id || `USR-${data.id}`}`;
                await loadSavedTheme();
                loadData();
            } else {
                document.getElementById('loadingSpinner').classList.add('hidden');
                document.getElementById('registrationForm').classList.remove('hidden');
                loadSavedTheme();
            }
        }

        async function registerUser() {
            const lastName = document.getElementById('lastName').value.trim();
            const firstName = document.getElementById('firstName').value.trim();
            const patronymic = document.getElementById('patronymic').value.trim();
            const birthDate = document.getElementById('birthDate').value;

            if (!lastName || !firstName || !birthDate) {
                alert('Пожалуйста, заполните фамилию, имя и дату рождения');
                return;
            }

            const { data, error } = await supabase
                .from('users')
                .insert([{
                    telegram_id: telegramUser.id,
                    last_name: lastName,
                    first_name: firstName,
                    patronymic: patronymic || null,
                    birth_date: birthDate
                }])
                .select()
                .single();

            if (error) {
                console.error('Ошибка регистрации:', error);
                alert('Ошибка при регистрации: ' + error.message);
                return;
            }

            currentUser = data;
            document.getElementById('registrationForm').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            const fullName = `${data.last_name} ${data.first_name} ${data.patronymic || ''}`.trim();
            document.getElementById('userName').innerText = fullName;
            document.getElementById('userPublicId').innerHTML = `ID: ${data.public_id || `USR-${data.id}`}`;
            await loadSavedTheme();
            loadData();
        }

        async function loadData() {
            if (!currentUser) {
                loadDemoData();
                return;
            }

            document.getElementById('resultsList').innerHTML = '<div class="info-note">📥 Загрузка результатов...</div>';
            document.getElementById('topList').innerHTML = '<div class="info-note">📥 Загрузка рейтинга...</div>';

            try {
                const { data: results, error: resultsError } = await supabase
                    .from('results')
                    .select(`
                        id,
                        place,
                        points,
                        awarded_at,
                        olympiads (id, name, year, public_id)
                    `)
                    .eq('user_id', currentUser.id)
                    .order('awarded_at', { ascending: false });

                if (!resultsError && results) {
                    if (results.length === 0) {
                        document.getElementById('resultsList').innerHTML = '<div class="info-note">📭 Пока нет результатов. Участвуйте в олимпиадах!</div>';
                        document.getElementById('ratingValue').innerText = '0';
                    } else {
                        let totalPoints = 0;
                        const resultsHtml = results.map(r => {
                            totalPoints += r.points;
                            let placeText = '';
                            if (r.place === '1') placeText = '🥇 1 место';
                            else if (r.place === '2') placeText = '🥈 2 место';
                            else if (r.place === '3') placeText = '🥉 3 место';
                            else placeText = '📋 Участие';
                            
                            const olympiad = r.olympiads;
                            const olympiadName = olympiad ? `${olympiad.name} (${olympiad.year})` : 'Олимпиада';
                            const olympiadPublicId = olympiad?.public_id ? ` ${olympiad.public_id}` : '';
                            
                            return `
                                <div class="result-item">
                                    <div>
                                        <div class="olympiad-name">${olympiadName}<span class="olympiad-badge">${olympiadPublicId}</span></div>
                                        <div style="font-size: 12px; color: var(--text-secondary);">${r.points} баллов</div>
                                    </div>
                                    <div class="olympiad-place">${placeText}</div>
                                </div>
                            `;
                        }).join('');
                        
                        document.getElementById('resultsList').innerHTML = resultsHtml;
                        document.getElementById('ratingValue').innerText = totalPoints;
                    }
                }

                const { data: allUsers, error: usersError } = await supabase
                    .from('users')
                    .select('id, last_name, first_name, patronymic, public_id');

                const { data: allResults, error: resultsAllError } = await supabase
                    .from('results')
                    .select('user_id, points');

                if (!usersError && !resultsAllError && allUsers) {
                    const userScores = {};
                    allResults.forEach(r => {
                        userScores[r.user_id] = (userScores[r.user_id] || 0) + r.points;
                    });
                    
                    const ranking = allUsers.map(u => {
                        const fullName = `${u.last_name} ${u.first_name} ${u.patronymic || ''}`.trim();
                        const displayName = u.public_id ? `${fullName} (${u.public_id})` : fullName;
                        return {
                            name: displayName,
                            score: userScores[u.id] || 0,
                            id: u.id
                        };
                    }).sort((a, b) => b.score - a.score);
                    
                    const topList = ranking.slice(0, 10);
                    const topHtml = topList.map((u, idx) => `
                        <div class="result-item" style="${u.id === currentUser?.id ? 'background: rgba(220,20,60,0.1);' : ''}">
                            <div><span style="font-weight: bold;">${idx + 1}</span>. ${u.name}</div>
                            <div style="font-weight: bold; color: #DC143C;">${u.score} баллов</div>
                        </div>
                    `).join('');
                    
                    document.getElementById('topList').innerHTML = topHtml || '<div class="info-note">Нет данных</div>';
                    
                    const userRank = ranking.findIndex(u => u.id === currentUser?.id) + 1;
                    if (userRank > 0) {
                        document.getElementById('globalRank').innerHTML = `Место: ${userRank} из ${ranking.length}`;
                    }
                }
            } catch (err) {
                console.error('Ошибка:', err);
                showError('Не удалось загрузить данные');
            }
        }

        function loadDemoData() {
            document.getElementById('ratingValue').innerText = '2450';
            document.getElementById('globalRank').innerHTML = 'Место: 3 из 42';
            document.getElementById('resultsList').innerHTML = `
                <div class="result-item"><div><div class="olympiad-name">Олимпиада по робототехнике (2025)</div><div style="font-size:12px;">100 баллов</div></div><div class="olympiad-place">🥇 1 место</div></div>
                <div class="result-item"><div><div class="olympiad-name">Робофест-2025</div><div style="font-size:12px;">75 баллов</div></div><div class="olympiad-place">🥈 2 место</div></div>
                <div class="result-item"><div><div class="olympiad-name">Открытый кубок</div><div style="font-size:12px;">25 баллов</div></div><div class="olympiad-place">📋 Участие</div></div>
            `;
            document.getElementById('topList').innerHTML = `
                <div class="result-item"><div>1. Алексей С. 🥇</div><div>3150 баллов</div></div>
                <div class="result-item"><div>2. Мария К. 🥈</div><div>2890 баллов</div></div>
                <div class="result-item" style="background: rgba(220,20,60,0.1);"><div>3. Вы 🥉</div><div>2450 баллов</div></div>
                <div class="result-item"><div>4. Дмитрий В.</div><div>2100 баллов</div></div>
            `;
        }

        function showError(msg) {
            document.getElementById('resultsList').innerHTML = `<div class="info-note error">❌ ${msg}</div>`;
            document.getElementById('topList').innerHTML = `<div class="info-note error">❌ ${msg}</div>`;
        }
    </script>
</body>
</html>
