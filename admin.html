<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Админ-панель | Московская робототехника</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-gradient-start: #DC143C;
            --bg-gradient-end: #8B0000;
            --card-bg: white;
            --text-primary: #1A1A1A;
            --text-secondary: #666;
            --border-color: #ddd;
            --result-bg: #f8f9fa;
            --button-bg: #DC143C;
            --button-hover: #B01030;
            --shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        body.dark {
            --bg-gradient-start: #1A1A2E;
            --bg-gradient-end: #0F0F1A;
            --card-bg: #2D2D3A;
            --text-primary: #EEEEEE;
            --text-secondary: #AAAAAA;
            --border-color: #444;
            --result-bg: #3A3A4A;
            --button-bg: #DC143C;
            --button-hover: #E0163E;
            --shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
        }
        
        .container { max-width: 600px; margin: 0 auto; position: relative; }
        
        .top-bar {
            position: sticky;
            top: 20px;
            z-index: 100;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .theme-btn, .back-btn {
            background: var(--card-bg);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 22px;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            text-decoration: none;
        }
        
        .back-btn {
            border-radius: 30px;
            width: auto;
            padding: 0 16px;
            font-size: 14px;
            gap: 6px;
        }
        
        .theme-btn:hover, .back-btn:hover {
            transform: scale(1.05);
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            transition: background 0.3s ease;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #DC143C;
        }
        
        .header h1 {
            font-size: 24px;
            color: var(--text-primary);
        }
        
        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--text-primary);
            margin: 0 0 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #DC143C;
        }
        
        .form-input, .form-select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 16px;
            background: var(--card-bg);
            color: var(--text-primary);
        }
        
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .form-row .form-input {
            margin-bottom: 0;
            flex: 1;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }
        
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            flex: 1;
            background: linear-gradient(135deg, #DC143C 0%, #B01030 100%);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .tab-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(220, 20, 60, 0.4);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #DC143C 0%, #B01030 100%);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .refresh-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(220, 20, 60, 0.4);
        }
        
        .refresh-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
        
        .file-zone {
            border: 2px dashed var(--border-color);
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            color: var(--text-secondary);
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        
        .file-zone:hover {
            border-color: #DC143C;
            background: rgba(220,20,60,0.05);
        }
        
        .preview-area {
            background: var(--result-bg);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 12px;
            overflow-x: auto;
            max-height: 200px;
        }
        
        .preview-area table {
            width: 100%;
            font-size: 11px;
            border-collapse: collapse;
        }
        
        .preview-area th, .preview-area td {
            padding: 4px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        
        .status-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }
        
        .status-message.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-message.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .hidden { display: none; }
        
        .info-note {
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            text-align: center;
        }
        
        body.dark .info-note {
            background: #3A3A4A;
            color: #FFD700;
        }
        
        body.dark .file-zone {
            background: var(--card-bg);
        }
        
        body.dark .preview-area {
            background: var(--result-bg);
        }
        
        .admin-warning {
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 15px;
        }
        
        body.dark .admin-warning {
            background: #3A3A4A;
            color: #FFD700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <a href="index.html" class="back-btn">← На главную</a>
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
        </div>
        
        <div class="card">
            <div class="header">
                <h1>🔧 Админ-панель</h1>
            </div>
            
            <div class="admin-warning">
                ⚠️ Управление олимпиадами и результатами участников
            </div>
            
            <!-- Кнопки вкладок -->
            <div class="tab-buttons">
                <button class="tab-btn" onclick="switchTab('olympiad')">📅 Олимпиады</button>
                <button class="tab-btn" onclick="switchTab('csv')">📤 CSV</button>
                <button class="tab-btn" onclick="switchTab('manual')">✏️ Ручной</button>
            </div>
            
            <!-- Вкладка: Олимпиады -->
            <div id="tab-olympiad" class="tab-content active">
                <div class="section-title">➕ Добавить новую олимпиаду</div>
                <div class="form-group">
                    <label>Название олимпиады</label>
                    <input type="text" id="newOlympiadName" class="form-input" placeholder="Например: Робофест-2026">
                </div>
                <div class="form-group">
                    <label>Год проведения</label>
                    <input type="number" id="newOlympiadYear" class="form-input" placeholder="2026" value="2026">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Баллы за 1 место</label>
                        <input type="number" id="newOlympiadPoints1" class="form-input" value="100">
                    </div>
                    <div class="form-group">
                        <label>Баллы за 2 место</label>
                        <input type="number" id="newOlympiadPoints2" class="form-input" value="75">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Баллы за 3 место</label>
                        <input type="number" id="newOlympiadPoints3" class="form-input" value="50">
                    </div>
                    <div class="form-group">
                        <label>Баллы за участие</label>
                        <input type="number" id="newOlympiadPointsPart" class="form-input" value="25">
                    </div>
                </div>
                <button class="refresh-btn" onclick="addOlympiad()">➕ Добавить олимпиаду</button>
                <div id="statusOlympiad" class="status-message hidden"></div>
            </div>
            
            <!-- Вкладка: CSV -->
            <div id="tab-csv" class="tab-content">
                <div class="section-title">📤 Загрузка результатов из CSV</div>
                <div class="form-group">
                    <label>Выберите олимпиаду</label>
                    <select id="csvOlympiadId" class="form-input">
                        <option value="">-- Загрузка --</option>
                    </select>
                </div>
                <div class="file-zone" onclick="document.getElementById('csvFileInput').click()">
                    📁 Нажмите или перетащите CSV файл
                    <input type="file" id="csvFileInput" accept=".csv" style="display: none;" onchange="previewCSV()">
                </div>
                <div id="csvPreview" class="preview-area hidden"></div>
                <button id="csvUploadBtn" class="refresh-btn" onclick="uploadCSV()" disabled>📤 Загрузить в базу</button>
                <div id="statusCsv" class="status-message hidden"></div>
            </div>
            
            <!-- Вкладка: Ручное добавление -->
            <div id="tab-manual" class="tab-content">
                <div class="section-title">✏️ Добавить результат вручную</div>
                <div class="form-group">
                    <label>Участник (Public ID или ID)</label>
                    <input type="text" id="manualUserIdentifier" class="form-input" placeholder="Например: USR-1 или 1">
                </div>
                <div class="form-group">
                    <label>Олимпиада</label>
                    <select id="manualOlympiadId" class="form-input">
                        <option value="">-- Выберите олимпиаду --</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Место</label>
                        <select id="manualPlace" class="form-input">
                            <option value="1">🥇 1 место</option>
                            <option value="2">🥈 2 место</option>
                            <option value="3">🥉 3 место</option>
                            <option value="participation">📋 Участие</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Баллы</label>
                        <input type="number" id="manualPoints" class="form-input" placeholder="Баллы">
                    </div>
                </div>
                <button class="refresh-btn" onclick="addManualResult()">✏️ Добавить результат</button>
                <div id="statusManual" class="status-message hidden"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vuqaoimnggjcbjdqkrqc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1cWFvaW1uZ2dqY2JqZHFrcnFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MzA0NDAsImV4cCI6MjA5NTIwNjQ0MH0.nt3BjibiB4ze92obD2VTd2cCxeo0Gtqar_uR-PjVciw';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentTab = 'olympiad';
        
        function applyTheme(theme) {
            const body = document.body;
            const themeBtn = document.getElementById('themeBtn');
            if (theme === 'dark') {
                body.classList.add('dark');
                if (themeBtn) themeBtn.textContent = '☀️';
            } else {
                body.classList.remove('dark');
                if (themeBtn) themeBtn.textContent = '🌙';
            }
        }
        
        async function toggleTheme() {
            const isDark = document.body.classList.contains('dark');
            const newTheme = isDark ? 'light' : 'dark';
            applyTheme(newTheme);
            localStorage.setItem('adminTheme', newTheme);
        }
        
        function loadSavedTheme() {
            const savedTheme = localStorage.getItem('adminTheme');
            if (savedTheme === 'dark') {
                applyTheme('dark');
            } else {
                applyTheme('light');
            }
        }
        
        function showStatus(type, message, statusId) {
            const statusDiv = document.getElementById(statusId);
            if (statusDiv) {
                statusDiv.textContent = message;
                statusDiv.className = `status-message ${type}`;
                statusDiv.classList.remove('hidden');
                setTimeout(() => statusDiv.classList.add('hidden'), 4000);
            }
        }
        
        function switchTab(tab) {
            currentTab = tab;
            
            // Скрываем все вкладки
            document.getElementById('tab-olympiad').classList.remove('active');
            document.getElementById('tab-csv').classList.remove('active');
            document.getElementById('tab-manual').classList.remove('active');
            
            // Показываем выбранную
            if (tab === 'olympiad') {
                document.getElementById('tab-olympiad').classList.add('active');
            } else if (tab === 'csv') {
                document.getElementById('tab-csv').classList.add('active');
                loadOlympiadsForSelect();
            } else if (tab === 'manual') {
                document.getElementById('tab-manual').classList.add('active');
                loadOlympiadsForSelect();
            }
        }
        
        async function loadOlympiadsForSelect() {
            const { data, error } = await supabase
                .from('olympiads')
                .select('id, name, year')
                .order('year', { ascending: false });
            
            if (error) {
                console.error('Ошибка загрузки олимпиад:', error);
                return;
            }
            
            const csvSelect = document.getElementById('csvOlympiadId');
            const manualSelect = document.getElementById('manualOlympiadId');
            
            const options = '<option value="">-- Выберите олимпиаду --</option>' + 
                (data || []).map(ol => `<option value="${ol.id}">${ol.name} (${ol.year})</option>`).join('');
            
            if (csvSelect) csvSelect.innerHTML = options;
            if (manualSelect) manualSelect.innerHTML = options;
        }
        
        async function addOlympiad() {
            const name = document.getElementById('newOlympiadName').value.trim();
            const year = parseInt(document.getElementById('newOlympiadYear').value);
            const points_1st = parseInt(document.getElementById('newOlympiadPoints1').value);
            const points_2nd = parseInt(document.getElementById('newOlympiadPoints2').value);
            const points_3rd = parseInt(document.getElementById('newOlympiadPoints3').value);
            const points_participation = parseInt(document.getElementById('newOlympiadPointsPart').value);
            
            if (!name || !year) {
                showStatus('error', 'Заполните название и год', 'statusOlympiad');
                return;
            }
            
            const { error } = await supabase
                .from('olympiads')
                .insert([{ name, year, points_1st, points_2nd, points_3rd, points_participation }]);
            
            if (error) {
                console.error('Ошибка Supabase:', error);
                showStatus('error', 'Ошибка: ' + error.message, 'statusOlympiad');
                return;
            }
            
            showStatus('success', `✅ Олимпиада "${name}" добавлена!`, 'statusOlympiad');
            document.getElementById('newOlympiadName').value = '';
            document.getElementById('newOlympiadYear').value = '2026';
            document.getElementById('newOlympiadPoints1').value = '100';
            document.getElementById('newOlympiadPoints2').value = '75';
            document.getElementById('newOlympiadPoints3').value = '50';
            document.getElementById('newOlympiadPointsPart').value = '25';
            loadOlympiadsForSelect();
        }
        
        let csvData = [];
        
        function previewCSV() {
            const file = document.getElementById('csvFileInput').files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                const lines = content.split('\n');
                const headers = lines[0].split(',').map(h => h.trim());
                
                csvData = [];
                const previewRows = [];
                
                for (let i = 1; i < lines.length; i++) {
                    if (lines[i].trim() === '') continue;
                    const values = lines[i].split(',');
                    const row = {};
                    headers.forEach((h, idx) => row[h] = values[idx]?.trim());
                    csvData.push(row);
                    if (previewRows.length < 5) previewRows.push(row);
                }
                
                let previewHtml = '<tr><thead><tr>';
                headers.forEach(h => previewHtml += `<th>${h}</th>`);
                previewHtml += '</thead><tbody>';
                previewRows.forEach(row => {
                    previewHtml += '<tr>';
                    headers.forEach(h => previewHtml += `<td>${row[h] || '-'}</td>`);
                    previewHtml += '</tr>';
                });
                if (csvData.length > 5) {
                    previewHtml += `<tr><td colspan="${headers.length}">... и ещё ${csvData.length - 5} записей</td></tr>`;
                }
                previewHtml += '</tbody></table>';
                
                document.getElementById('csvPreview').innerHTML = previewHtml;
                document.getElementById('csvPreview').classList.remove('hidden');
                document.getElementById('csvUploadBtn').disabled = false;
            };
            reader.readAsText(file, 'UTF-8');
        }
        
        async function uploadCSV() {
            const olympiadId = document.getElementById('csvOlympiadId').value;
            if (!olympiadId) {
                showStatus('error', 'Выберите олимпиаду', 'statusCsv');
                return;
            }
            
            if (csvData.length === 0) {
                showStatus('error', 'Нет данных', 'statusCsv');
                return;
            }
            
            const uploadBtn = document.getElementById('csvUploadBtn');
            uploadBtn.disabled = true;
            uploadBtn.textContent = '⏳ Загрузка...';
            
            let successCount = 0;
            let errorCount = 0;
            
            for (const row of csvData) {
                let user_id = row.user_id || row.userId || row.id;
                if (user_id && isNaN(user_id) && user_id.toString().startsWith('USR-')) {
                    const num = user_id.replace('USR-', '');
                    user_id = parseInt(num);
                } else {
                    user_id = parseInt(user_id);
                }
                
                const place = row.place || row.место || 'participation';
                const points = parseInt(row.points || row.баллы || 0);
                
                if (isNaN(user_id) || isNaN(points)) {
                    errorCount++;
                    continue;
                }
                
                const { error } = await supabase
                    .from('results')
                    .insert([{
                        user_id: user_id,
                        olympiad_id: parseInt(olympiadId),
                        place: place,
                        points: points,
                        awarded_at: new Date().toISOString()
                    }]);
                
                if (error) errorCount++;
                else successCount++;
            }
            
            showStatus('success', `✅ Загружено: ${successCount} | ❌ Ошибок: ${errorCount}`, 'statusCsv');
            uploadBtn.disabled = false;
            uploadBtn.textContent = '📤 Загрузить в базу';
            
            if (successCount > 0) {
                document.getElementById('csvFileInput').value = '';
                document.getElementById('csvPreview').innerHTML = '';
                document.getElementById('csvPreview').classList.add('hidden');
                csvData = [];
            }
        }
        
        async function addManualResult() {
            const identifier = document.getElementById('manualUserIdentifier').value.trim();
            const olympiadId = document.getElementById('manualOlympiadId').value;
            const place = document.getElementById('manualPlace').value;
            const points = parseInt(document.getElementById('manualPoints').value);
            
            if (!identifier || !olympiadId || !points) {
                showStatus('error', 'Заполните все поля', 'statusManual');
                return;
            }
            
            let user_id = null;
            if (identifier.toString().startsWith('USR-')) {
                const { data } = await supabase
                    .from('users')
                    .select('id')
                    .eq('public_id', identifier)
                    .single();
                if (data) user_id = data.id;
            } else {
                user_id = parseInt(identifier);
            }
            
            if (!user_id) {
                showStatus('error', 'Пользователь не найден', 'statusManual');
                return;
            }
            
            const { error } = await supabase
                .from('results')
                .insert([{
                    user_id: user_id,
                    olympiad_id: parseInt(olympiadId),
                    place: place,
                    points: points,
                    awarded_at: new Date().toISOString()
                }]);
            
            if (error) {
                showStatus('error', 'Ошибка: ' + error.message, 'statusManual');
                return;
            }
            
            showStatus('success', '✅ Результат добавлен!', 'statusManual');
            document.getElementById('manualUserIdentifier').value = '';
            document.getElementById('manualPoints').value = '';
        }
        
        async function checkAdminAccess() {
            let telegramId = null;
            
            if (window.Telegram && window.Telegram.WebApp) {
                const webApp = window.Telegram.WebApp;
                const user = webApp.initDataUnsafe?.user;
                if (user) telegramId = user.id;
                webApp.ready();
                webApp.expand();
            }
            
            if (!telegramId) {
                const savedUser = localStorage.getItem('telegram_user');
                if (savedUser) {
                    try {
                        const user = JSON.parse(savedUser);
                        telegramId = user.id;
                    } catch(e) {}
                }
            }
            
            if (telegramId) {
                const { data, error } = await supabase
                    .from('users')
                    .select('public_id')
                    .eq('telegram_id', telegramId)
                    .single();
                
                if (data && data.public_id === 'USR-1') {
                    return true;
                }
            }
            
            window.location.href = 'index.html';
            return false;
        }
        
        window.onload = async function() {
            loadSavedTheme();
            const isAdmin = await checkAdminAccess();
            if (!isAdmin) return;
            
            await loadOlympiadsForSelect();
            switchTab('olympiad');
        };
    </script>
</body>
</html>
