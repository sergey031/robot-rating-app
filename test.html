<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест Supabase на GitHub Pages</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: monospace; padding: 20px; background: #f0f0f0; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        pre { background: white; padding: 10px; border-radius: 5px; overflow-x: auto; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-top: 20px; }
        .test-card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>🔌 Тест подключения к Supabase</h1>
    
    <div class="test-card">
        <h2>Статус:</h2>
        <div id="status">⏳ Проверка...</div>
    </div>
    
    <div class="test-card">
        <h2>Данные из таблицы "olympiads":</h2>
        <div id="data"></div>
    </div>
    
    <div class="test-card">
        <h2>Проверка записи данных:</h2>
        <button onclick="testInsert()">📝 Тестовая запись</button>
        <div id="insertResult"></div>
    </div>

    <script>
        // Конфигурация Supabase
        const SUPABASE_URL = 'https://vuqaoimnggjcbjdqkrqc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1cWFvaW1uZ2dqY2JqZHFrcnFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MzA0NDAsImV4cCI6MjA5NTIwNjQ0MH0.nt3BjibiB4ze92obD2VTd2cCxeo0Gtqar_uR-PjVciw';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        async function testConnection() {
            const statusDiv = document.getElementById('status');
            const dataDiv = document.getElementById('data');
            
            try {
                // Пробуем получить список олимпиад
                const { data, error } = await supabase
                    .from('olympiads')
                    .select('*');
                
                if (error) {
                    statusDiv.innerHTML = `<span class="error">❌ Ошибка подключения: ${error.message}</span>`;
                    dataDiv.innerHTML = `<pre>${JSON.stringify(error, null, 2)}</pre>`;
                    return;
                }
                
                if (data) {
                    statusDiv.innerHTML = '<span class="success">✅ Соединение с базой данных работает!</span>';
                    dataDiv.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre><p>Найдено олимпиад: ${data.length}</p>`;
                }
            } catch (err) {
                statusDiv.innerHTML = `<span class="error">❌ Ошибка: ${err.message}</span>`;
            }
        }
        
        async function testInsert() {
            const resultDiv = document.getElementById('insertResult');
            resultDiv.innerHTML = '⏳ Проверка записи...';
            
            try {
                // Пробуем записать тестовые данные (если таблица test не существует, будет ошибка)
                const { data, error } = await supabase
                    .from('users')
                    .select('count');
                
                if (error) {
                    resultDiv.innerHTML = `<span class="error">❌ Ошибка при попытке записи: ${error.message}</span>`;
                } else {
                    resultDiv.innerHTML = '<span class="success">✅ Доступ к таблице "users" есть. Всё работает!</span>';
                }
            } catch (err) {
                resultDiv.innerHTML = `<span class="error">❌ Ошибка: ${err.message}</span>`;
            }
        }
        
        // Запускаем тест при загрузке страницы
        testConnection();
    </script>
</body>
</html>
