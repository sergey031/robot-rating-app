<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ультра-тест Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Результат проверки:</h1>
    <pre id="output" style="background: #f4f4f4; padding: 15px; border-radius: 8px;">Проверяю подключение...</pre>

    <script>
        // ВАШИ ДАННЫЕ
        const SUPABASE_URL = 'https://vuqaoimnggjcbjdqkrqc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1cWFvaW1uZ2dqY2JqZHFrcnFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MzA0NDAsImV4cCI6MjA5NTIwNjQ0MH0.nt3BjibiB4ze92obD2VTd2cCxeo0Gtqar_uR-PjVciw';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const outputDiv = document.getElementById('output');

        async function simpleTest() {
            outputDiv.innerText = '⏳ Отправляю запрос к Supabase...';
            
            try {
                // Пытаемся получить список олимпиад из таблицы
                const { data, error } = await supabase.from('olympiads').select('*');

                if (error) {
                    // Если ошибка, показываем её
                    outputDiv.innerText = '❌ ОШИБКА SUPABASE:\n' + JSON.stringify(error, null, 2);
                } else {
                    // Если успех, показываем данные
                    outputDiv.innerText = '✅ УСПЕХ! Данные получены:\n\n' + JSON.stringify(data, null, 2);
                }
            } catch (err) {
                // Если не удалось даже соединиться
                outputDiv.innerText = '❌ КРИТИЧЕСКАЯ ОШИБКА (не удалось соединиться):\n' + err.message;
            }
        }

        simpleTest();
    </script>
</body>
</html>
